<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Melody</title>
  <meta name="description" content="Melody — a beautiful, offline-first music player." />
  <meta name="theme-color" content="#F5F1EC" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Melody" />

  <link rel="icon" href="./assets/icons/favicon.png" type="image/png" />

  <!-- Applies the saved theme before first paint so there's no flash of
       the wrong appearance. theme-service.js takes over after boot and
       is the source of truth from then on (this is just a fast mirror). -->
  <script>
    (function () {
      try {
        var mode = localStorage.getItem('melody-theme-sync') || 'system';
        var resolved = mode === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : mode;
        document.documentElement.setAttribute('data-theme', resolved);
      } catch (e) { /* default light theme applies via CSS if this fails */ }
    })();
  </script>

  <!-- Design system -->
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/onboarding.css" />
  <link rel="stylesheet" href="./css/home.css" />
  <link rel="stylesheet" href="./css/player.css" />
  <link rel="stylesheet" href="./css/lyrics.css" />
  <link rel="stylesheet" href="./css/screens.css" />
  <link rel="stylesheet" href="./css/toast.css" />
  <link rel="stylesheet" href="./css/library-premium.css" />
  <link rel="stylesheet" href="./css/premium.css" />
  <link rel="stylesheet" href="./css/auth.css" />
</head>
<body>
  <div class="app-shell">
    <div id="app-root"></div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
